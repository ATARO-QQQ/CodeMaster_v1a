<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX.A Text Revision</title>
    <style>
        body {
            background-color: #008080; 
            font-family: "MS UI Gothic", "ＭＳ Ｐゴシック", "MS PGothic", Tahoma, "MS Sans Serif", sans-serif;
            font-size: 12px;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            font-smooth: never;
        }

        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
            background: #dfdfdf;
        }
        ::-webkit-scrollbar-button {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            display: block;
        }
        ::-webkit-scrollbar-button:active {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #000000, inset -1px -1px #dfdfdf;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
        }

        .window {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: #000080;
            color: white;
            font-weight: bold;
            padding: 2px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
            margin: 2px;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 2px;
        }

        .title-bar-controls button {
            width: 16px;
            height: 14px;
            font-size: 10px;
            font-weight: bold;
            line-height: 10px;
            padding: 0;
            margin-left: 2px;
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            color: #000000;
        }

        .title-bar-controls button:active {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #000000, inset -1px -1px #dfdfdf;
            padding: 1px 0 0 1px;
        }

        .menu-bar {
            border-bottom: 1px solid #808080;
            box-shadow: 0 1px 0 #ffffff; 
            padding: 2px;
            display: flex;
            gap: 10px;
            margin: 0 2px;
        }

        .menu-item {
            padding: 2px 6px;
            cursor: pointer;
        }
        .menu-item:hover {
            background-color: #000080;
            color: white;
        }

        .window-body {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        fieldset {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 10px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        legend {
            color: #000000;
            padding: 0 4px;
        }

        input[type="text"], input[type="password"], textarea, select {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #000000, inset -1px -1px #dfdfdf;
            background-color: #ffffff;
            padding: 4px;
            font-family: inherit;
            box-sizing: border-box;
            width: 100%;
            outline: none;
            resize: vertical;
        }

        button {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            padding: 4px 15px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            color: #000000;
        }

        button:active {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #000000, inset -1px -1px #dfdfdf;
            padding: 5px 14px 3px 16px;
        }

        button:disabled {
            color: #808080;
            text-shadow: 1px 1px 0px #ffffff;
        }

        .api-key-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea.editor-font {
            font-family: "ＭＳ ゴシック", "MS Gothic", monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        .status-bar {
            border-top: 1px solid #808080;
            box-shadow: inset 0 1px 0 #ffffff;
            padding: 3px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            background-color: #c0c0c0;
            margin-top: 2px;
        }

        .loading-container {
            display: none;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
        }
        
        .classic-progress-bar {
            width: 150px;
            height: 14px;
            background-color: #c0c0c0;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-bottom: 1px solid #ffffff;
            border-right: 1px solid #ffffff;
            position: relative;
            box-sizing: border-box;
            padding: 1px;
        }

        .classic-progress-bar::before {
            content: "";
            display: block;
            height: 100%;
            background-image: linear-gradient(90deg, #000080 8px, transparent 8px);
            background-size: 10px 100%;
            animation: fill-bar 3s steps(15, end) infinite;
        }

        @keyframes fill-bar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .dialog {
            width: 300px;
            z-index: 1001;
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080, 2px 2px 5px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-bar-text">
            NEX.A Text Revision
        </div>
        <div class="title-bar-controls">
            <button aria-label="Minimize" onclick="showMsg('最小化しても何の意味もない…。')">_</button>
            <button aria-label="Maximize" onclick="showMsg('ウィンドウサイズは固定です。')">□</button>
            <button aria-label="Close" onclick="showMsg('閉じることはできません。')">X</button>
        </div>
    </div>
    
    <div class="menu-bar">
        <span class="menu-item" onclick="openHelp()">ヘルプ(H)</span>
    </div>

    <div class="window-body">
        <fieldset>
            <legend>設定</legend>
            <div class="api-key-container">
                <label for="apiKey">Gemini API キー:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy...">
                <button onclick="openHelp()">?</button>
            </div>
        </fieldset>

        <fieldset>
            <legend>元の文章</legend>
            <textarea id="sourceText" rows="6" class="editor-font" placeholder="ここに校閲・変換したい元の文章を入力してください。"></textarea>
        </fieldset>

        <fieldset>
            <legend>AIへの指示 (文体指定・校閲内容)</legend>
            <textarea id="instructionText" rows="2" class="editor-font" placeholder="例: 丁寧な敬語（です・ます調）に直してください。 / 誤字脱字を修正し、よりプロフェッショナルなトーンにしてください。"></textarea>
            <div style="text-align: right; margin-top: 5px;">
                <button id="generateBtn" onclick="startGeneration()">変換開始(G)</button>
            </div>
        </fieldset>

        <fieldset>
            <legend>出力結果</legend>
            <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 5px;">
                <button onclick="copyCode()" style="padding: 2px 8px;">コピー(C)</button>
            </div>
            <textarea id="resultText" rows="8" class="editor-font" readonly placeholder="ここに変換された文章が出力されます。"></textarea>
        </fieldset>
    </div>

    <div class="status-bar">
        <div id="statusText" style="width: 100%;">準備完了</div>
        <div class="loading-container" id="loadingIndicator">
            <span id="loadingText" style="flex-grow: 1; text-align: left;">NEX.Aが推敲中...</span>
            <div class="classic-progress-bar"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="msgModal">
    <div class="window dialog">
        <div class="title-bar">
            <div class="title-bar-text">情報</div>
            <div class="title-bar-controls">
                <button onclick="closeMsg()">X</button>
            </div>
        </div>
        <div class="window-body" style="text-align: center; padding: 20px;">
            <p id="msgText"></p>
            <button onclick="closeMsg()" style="margin-top: 10px; width: 80px;">OK</button>
        </div>
    </div>
</div>

<script>
    let loadingInterval = null;
    const loadingTexts = [
        "文章を解析しています...",
        "文脈を読み取っています...",
        "誤字・脱字を確認しています...",
        "文体を調整しています...",
        "推敲を行っています...",
        "最終確認をしています..."
    ];

    function showMsg(text) {
        document.getElementById('msgText').innerText = text;
        document.getElementById('msgModal').style.display = 'flex';
    }

    function closeMsg() {
        document.getElementById('msgModal').style.display = 'none';
    }

    function openHelp() {
        showMsg("【使い方】\n1. Google AI Studio でGeminiのAPIキーを取得し設定欄に入力します。\n2. 「元の文章」にテキストを入力します。\n3. 「AIへの指示」に変換したい文体や要望を書きます。\n4. 「変換開始」を押すと結果が出力されます。");
    }

    function copyCode() {
        const resultText = document.getElementById('resultText').value;
        if (!resultText) return;
        
        const textArea = document.createElement("textarea");
        textArea.value = resultText;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            document.getElementById('statusText').innerText = "クリップボードにコピーしました。";
        } catch (err) {
            showMsg("コピーに失敗しました。");
        }
        document.body.removeChild(textArea);
    }

    function setUIState(isGenerating) {
        document.getElementById('generateBtn').disabled = isGenerating;
        document.getElementById('sourceText').disabled = isGenerating;
        document.getElementById('instructionText').disabled = isGenerating;
        document.getElementById('apiKey').disabled = isGenerating;
        
        const loadingIndicator = document.getElementById('loadingIndicator');
        const statusText = document.getElementById('statusText');
        const loadingTextEl = document.getElementById('loadingText');

        if (isGenerating) {
            statusText.style.display = 'none';
            loadingIndicator.style.display = 'flex';
            
            let textIndex = 0;
            loadingTextEl.innerText = loadingTexts[textIndex];
            loadingInterval = setInterval(() => {
                textIndex = (textIndex + 1) % loadingTexts.length;
                loadingTextEl.innerText = loadingTexts[textIndex];
            }, 1500);
        } else {
            statusText.style.display = 'block';
            loadingIndicator.style.display = 'none';
            if (loadingInterval) {
                clearInterval(loadingInterval);
                loadingInterval = null;
            }
        }
    }

    async function startGeneration() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const sourceText = document.getElementById('sourceText').value.trim();
        const instructionText = document.getElementById('instructionText').value.trim();

        if (!apiKey) {
            showMsg("Gemini APIキーを入力してください。");
            return;
        }
        if (!sourceText) {
            showMsg("元の文章を入力してください。");
            return;
        }
        if (!instructionText) {
            showMsg("AIへの指示（文体や校閲内容）を入力してください。");
            return;
        }

        setUIState(true);
        document.getElementById('resultText').value = '';

        const systemPrompt = `あなたはプロの編集者・校正者です。
ユーザーから提供された「元の文章」を、「指示」に従って校閲および文体の変換を行ってください。
出力は変換後の文章のみとし、解説や挨拶、Markdownのコードブロックによる装飾は一切含めないでください。`;

        const userPrompt = `以下の文章を、指示に従って校閲・変換してください。\n\n【元の文章】\n${sourceText}\n\n【指示】\n${instructionText}`;

        const payload = {
            contents: [{ role: "user", parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

        try {
            const data = await fetchWithRetry(url, payload);
            
            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("AIから有効な応答がありませんでした。");
            }

            const responseText = data.candidates[0].content.parts[0].text;
            
            // 出力結果をセット
            document.getElementById('resultText').value = responseText.trim();
            document.getElementById('statusText').innerText = "文章の変換が完了しました。";

        } catch (error) {
            console.error(error);
            showMsg("エラーが発生しました: " + error.message);
            document.getElementById('statusText').innerText = "エラーが発生しました。";
        } finally {
            setUIState(false);
        }
    }

    async function fetchWithRetry(url, payload, maxRetries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        
        for (let i = 0; i <= maxRetries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || `HTTP error! status: ${response.status}`);
                }

                return data;

            } catch (error) {
                if (i === maxRetries) {
                    throw error;
                }
                await new Promise(resolve => setTimeout(resolve, delays[i]));
            }
        }
    }
</script>

</body>
</html>
