<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCoder 2026 - Local AI Edition</title>
    <style>
        /* Windows Me / 9x 風のレトロCSS */
        body {
            font-family: 'MS PGothic', 'ＭＳ Ｐゴシック', 'MS UI Gothic', Tahoma, sans-serif;
            background-color: #008080; /* レトロなデスクトップ背景色 */
            color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 12px;
        }

        /* アウトセット (出っ張り) ボーダー */
        .win-outset {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
        }

        /* インセット (へこみ) ボーダー */
        .win-inset {
            background-color: #ffffff;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #000000, inset -1px -1px #dfdfdf;
        }

        /* メインウィンドウ */
        .window {
            width: 800px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            padding: 2px;
        }

        /* タイトルバー */
        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-btn {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            font-size: 9px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            cursor: default;
            font-family: sans-serif;
            font-weight: bold;
        }

        /* メニューバー (ダミー) */
        .menu-bar {
            display: flex;
            gap: 15px;
            padding: 2px 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid #808080;
            box-shadow: 0 1px 0 #ffffff;
        }
        .menu-item { display: inline-block; }
        .menu-item:first-letter { text-decoration: underline; }

        /* コンテンツエリア */
        .content {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ボタン */
        button {
            font-family: inherit;
            font-size: 12px;
            padding: 4px 15px;
            cursor: pointer;
            outline: none;
        }
        button:active:not(:disabled) {
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf;
            padding: 5px 14px 3px 16px; /* 押した感を出す */
        }
        button:disabled {
            color: #808080;
            text-shadow: 1px 1px #ffffff;
        }

        /* テキストエリア */
        textarea, input[type="text"] {
            font-family: 'MS PGothic', monospace;
            font-size: 12px;
            padding: 4px;
            resize: none;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        /* レイアウト */
        .flex-row { display: flex; gap: 10px; }
        .flex-col { display: flex; flex-direction: column; gap: 5px; }
        .pane-left { width: 250px; display: flex; flex-direction: column; }
        .pane-right { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* ファイルリスト */
        .file-list {
            list-style: none;
            margin: 0;
            padding: 2px;
            background: white;
            height: 250px;
            overflow-y: auto;
        }
        .file-item {
            padding: 2px 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item:hover { background-color: #dfdfdf; }
        .file-item.active {
            background-color: #000080;
            color: white;
        }

        /* プログレスバー */
        .progress-container {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .progress-bar-wrap {
            height: 18px;
            flex-grow: 1;
            padding: 2px;
            display: flex;
            gap: 2px;
        }
        .progress-block {
            width: 12px;
            height: 100%;
            background-color: #000080;
            display: none;
        }

        /* ステータスバー */
        .status-bar {
            margin-top: 5px;
            padding: 2px 5px;
            display: flex;
            justify-content: space-between;
        }

        /* アイコン類 */
        .icon-file {
            width: 12px; height: 14px;
            border: 1px solid #808080;
            background: white;
            position: relative;
            display: inline-block;
        }
        .icon-file::before {
            content: ''; position: absolute; top: 0; right: 0;
            border-width: 0 4px 4px 0;
            border-style: solid;
            border-color: #c0c0c0 #c0c0c0 white white;
            box-shadow: -1px 1px #808080;
        }

        /* ロード時のカーソル */
        body.loading, body.loading * {
            cursor: wait !important;
        }

        .label { margin-bottom: 2px; }
        
        /* メッセージボックス (非表示時) */
        #msgBox { display: none; }

    </style>
</head>
<body>

<div class="window win-outset">
    <div class="title-bar">
        <div style="display: flex; align-items: center; gap: 5px;">
            <div style="width: 14px; height: 14px; background: #00ffff; border: 1px solid white;"></div>
            <span>AutoCoder 2026 - Local AI Edition</span>
        </div>
        <div class="title-bar-controls">
            <div class="title-btn">_</div>
            <div class="title-btn">□</div>
            <div class="title-btn">X</div>
        </div>
    </div>
    
    <div class="menu-bar">
        <div class="menu-item">File(F)</div>
        <div class="menu-item">Edit(E)</div>
        <div class="menu-item">View(V)</div>
        <div class="menu-item">Tools(T)</div>
        <div class="menu-item">Help(H)</div>
    </div>

    <div class="content">
        <div class="flex-col">
            <div class="label">AIへの指示文 (Prompt):</div>
            <textarea id="promptInput" class="win-inset" rows="4" placeholder="例：C++とヘッダファイルに分かれた複雑な計算機プログラムを作って。"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <span class="label" style="margin: 0;">Local API URL:</span>
                    <input type="text" id="apiUrlInput" class="win-inset" value="http://localhost:11434/api/generate" style="width: 220px;">
                    <span class="label" style="margin: 0;">Model:</span>
                    <input type="text" id="modelInput" class="win-inset" value="llama3" style="width: 80px;">
                </div>
                <button id="generateBtn" class="win-outset" onclick="startGeneration()">生成開始(<u>G</u>)</button>
            </div>
        </div>

        <div id="progressArea" class="progress-container">
            <div style="width: 20px; height: 20px; border: 1px solid #808080; border-radius: 50%; border-top-color: #000; animation: spin 1s linear infinite; display: inline-block;"></div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            <span>AIがコードを設計・記述しています...</span>
            <div class="progress-bar-wrap win-inset" id="progressBar">
                <!-- ブロックをJSで追加 -->
            </div>
        </div>

        <div style="border-top: 1px solid #808080; border-bottom: 1px solid #ffffff; margin: 5px 0;"></div>

        <div class="flex-row">
            <div class="pane-left">
                <div class="label">出力ファイル一覧:</div>
                <div class="win-inset">
                    <ul class="file-list" id="fileList">
                        <!-- ファイルリストがここに生成される -->
                        <li style="padding: 10px; color: #808080;">生成待ち...</li>
                    </ul>
                </div>
            </div>
            
            <div class="pane-right">
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div class="label">ソースコードプレビュー: <span id="currentFileName" style="font-weight: bold;">---</span></div>
                    <button class="win-outset" style="margin-bottom: 2px;" onclick="copyCode()">ｺﾋﾟｰ(<u>C</u>)</button>
                </div>
                <textarea id="codeView" class="win-inset" style="height: 250px; white-space: pre; overflow-x: auto; font-family: 'Courier New', monospace;" readonly></textarea>
            </div>
        </div>

        <div class="flex-col" style="margin-top: 5px;">
            <div class="label">Visual Studio 2026 実装手順:</div>
            <textarea id="instructionsView" class="win-inset" style="height: 100px; background-color: #ffffe1;" readonly></textarea>
        </div>
    </div>

    <div class="status-bar win-inset" style="border-top: none; border-left: none; border-right: none; border-bottom: none; box-shadow: none; border-top: 1px solid #808080;">
        <span id="statusText">Ready - Local Engine Connected</span>
        <span>Memory: 640KB</span>
    </div>

    <!-- カスタムメッセージボックス -->
    <div id="msgBox" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 100; display: none; justify-content: center; align-items: center;">
        <div class="window win-outset" style="width: 300px;">
            <div class="title-bar">
                <span>情報</span>
                <div class="title-btn" onclick="closeMsg()">X</div>
            </div>
            <div style="padding: 15px; display: flex; gap: 15px; align-items: center;">
                <div style="font-size: 24px; color: #000080;">i</div>
                <div id="msgText"></div>
            </div>
            <div style="text-align: center; padding-bottom: 10px;">
                <button class="win-outset" style="width: 80px;" onclick="closeMsg()">OK</button>
            </div>
        </div>
    </div>
</div>

<script>
    // システム環境が提供するAPIキー (ユーザー入力不要)
    const apiKey = "";
    
    // 生成されたデータを保持する変数
    let generatedFiles = [];
    let currentSelectedIndex = -1;

    // UI要素の取得
    const promptInput = document.getElementById('promptInput');
    const apiUrlInput = document.getElementById('apiUrlInput');
    const modelInput = document.getElementById('modelInput');
    const generateBtn = document.getElementById('generateBtn');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const fileList = document.getElementById('fileList');
    const codeView = document.getElementById('codeView');
    const currentFileName = document.getElementById('currentFileName');
    const instructionsView = document.getElementById('instructionsView');
    const statusText = document.getElementById('statusText');

    // プログレスバーのアニメーション用
    let progressInterval;

    function showMsg(text) {
        document.getElementById('msgText').innerText = text;
        document.getElementById('msgBox').style.display = 'flex';
    }

    function closeMsg() {
        document.getElementById('msgBox').style.display = 'none';
    }

    function startProgress() {
        // プログレスバーのブロックを生成
        progressBar.innerHTML = '';
        for(let i=0; i<20; i++) {
            const block = document.createElement('div');
            block.className = 'progress-block';
            progressBar.appendChild(block);
        }
        
        let blocks = document.querySelectorAll('.progress-block');
        let currentBlock = 0;
        
        progressInterval = setInterval(() => {
            if (currentBlock < blocks.length) {
                blocks[currentBlock].style.display = 'block';
                currentBlock++;
            } else {
                // 満タンになったらリセットしてループ
                blocks.forEach(b => b.style.display = 'none');
                currentBlock = 0;
            }
        }, 300);
    }

    function stopProgress() {
        clearInterval(progressInterval);
        document.querySelectorAll('.progress-block').forEach(b => b.style.display = 'block');
    }

    // 指数バックオフ付きのAPIコール
    async function fetchWithRetry(url, options, maxRetries = 5) {
        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
        }
    }

    async function startGeneration() {
        const prompt = promptInput.value.trim();
        if (!prompt) {
            showMsg("指示文を入力してください。");
            return;
        }

        // UI状態の更新
        generateBtn.disabled = true;
        document.body.classList.add('loading');
        progressArea.style.display = 'flex';
        statusText.innerText = "Generating codes... Please wait.";
        fileList.innerHTML = '<li style="padding: 10px; color: #808080;">生成中...</li>';
        codeView.value = '';
        currentFileName.innerText = '---';
        instructionsView.value = '';
        generatedFiles = [];
        
        startProgress();

        const endpoint = apiUrlInput.value.trim();
        const modelName = modelInput.value.trim();
        
        // AIへのシステム指示
        const systemInstruction = `あなたは優秀なAIプログラマーです。
ユーザーの指示に従い、長大で品質の高いコードを生成してください。
コードは意味のある単位で複数ファイルに分割してください。
また、IDEとして「Visual Studio 2026」を使用することを前提とし、そのプロジェクトの作成や実装手順をステップバイステップで詳しく説明してください。

出力は必ず以下の構造のJSONフォーマットのみで行ってください。マークダウンやその他の説明は一切含めないでください。
{
  "files": [
    { "filename": "main.cpp", "content": "コード内容..." }
  ],
  "instructions": "Visual Studio 2026での手順..."
}`;

        const payload = {
            model: modelName,
            prompt: systemInstruction + "\n\n【ユーザーの指示】\n" + prompt,
            format: "json",
            stream: false
        };

        try {
            const result = await fetchWithRetry(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }, 1); // ローカルサーバーへの接続なのでリトライは1回

            // JSONテキストの抽出とパース (Ollamaの場合、応答は result.response に格納される)
            const jsonText = result.response;
            const parsedData = JSON.parse(jsonText);

            generatedFiles = parsedData.files || [];
            const instructions = parsedData.instructions || "手順が生成されませんでした。";

            stopProgress();
            renderFileList();
            instructionsView.value = instructions;
            
            if(generatedFiles.length > 0) {
                selectFile(0);
                showMsg("コードの生成が完了しました。");
            } else {
                showMsg("ファイルが生成されませんでした。");
            }
            statusText.innerText = "Generation Complete.";

        } catch (error) {
            console.error("AI Error:", error);
            stopProgress();
            
            let errMsg = error.message;
            if(errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError')) {
                errMsg = "ローカルAIサーバーに接続できませんでした。\nOllama等のアプリが起動しているか確認してください。\n※ブラウザから接続するには、環境変数 OLLAMA_ORIGINS=\"*\" の設定が必要です。";
            }
            
            showMsg("エラーが発生しました。\n" + errMsg);
            statusText.innerText = "Error occurred.";
            fileList.innerHTML = '<li style="padding: 10px; color: red;">生成失敗</li>';
        } finally {
            generateBtn.disabled = false;
            document.body.classList.remove('loading');
            progressArea.style.display = 'none';
        }
    }

    function renderFileList() {
        fileList.innerHTML = '';
        generatedFiles.forEach((file, index) => {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `<span class="icon-file"></span> ${file.filename}`;
            li.onclick = () => selectFile(index);
            fileList.appendChild(li);
        });
    }

    function selectFile(index) {
        if(index < 0 || index >= generatedFiles.length) return;
        currentSelectedIndex = index;
        
        // リストのハイライト更新
        const items = fileList.getElementsByTagName('li');
        for(let i=0; i<items.length; i++) {
            items[i].classList.remove('active');
        }
        items[index].classList.add('active');

        // エディタの更新
        const file = generatedFiles[index];
        currentFileName.innerText = file.filename;
        codeView.value = file.content;
        
        // スクロールを上に戻す
        codeView.scrollTop = 0;
    }

    function copyCode() {
        if (!codeView.value) return;
        
        codeView.select();
        try {
            // navigator.clipboard は iframe 制約でコケることがあるため execCommand を使用
            document.execCommand('copy');
            showMsg("クリップボードにコピーしました。");
        } catch (err) {
            showMsg("コピーに失敗しました。");
        }
        // 選択解除
        window.getSelection().removeAllRanges();
    }
</script>

</body>
</html>
