<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Code Generator</title>
<style>
    /* Windows Me 風のベーススタイル */
    :root {
        --win-bg: #d4d0c8;
        --win-border-light: #ffffff;
        --win-border-dark: #404040;
        --win-border-medium: #808080;
        --win-title-start: #000080;
        --win-title-end: #1084d0;
        --desktop-bg: #008080;
    }

    body {
        background-color: var(--desktop-bg);
        /* 古めかしいフォント指定 */
        font-family: "MS UI Gothic", "MS PGothic", "ＭＳ Ｐゴシック", "Tahoma", sans-serif;
        font-size: 12px;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
    }

    /* ウィンドウ全体のスタイル */
    .window {
        background-color: var(--win-bg);
        border-top: 1px solid var(--win-border-light);
        border-left: 1px solid var(--win-border-light);
        border-right: 1px solid var(--win-border-dark);
        border-bottom: 1px solid var(--win-border-dark);
        box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 var(--win-border-medium), 1px 1px 0 #000;
        width: 95vw;
        height: 95vh;
        display: flex;
        flex-direction: column;
    }

    /* タイトルバー */
    .title-bar {
        background: linear-gradient(90deg, var(--win-title-start), var(--win-title-end));
        padding: 3px 5px;
        color: white;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 2px;
        letter-spacing: 1px;
    }

    .title-bar-buttons button {
        background-color: var(--win-bg);
        border-top: 1px solid var(--win-border-light);
        border-left: 1px solid var(--win-border-light);
        border-right: 1px solid var(--win-border-dark);
        border-bottom: 1px solid var(--win-border-dark);
        font-weight: bold;
        font-size: 10px;
        width: 16px;
        height: 14px;
        padding: 0;
        line-height: 10px;
        cursor: default;
        outline: none;
    }

    .title-bar-buttons button:active {
        border-top: 1px solid var(--win-border-dark);
        border-left: 1px solid var(--win-border-dark);
        border-right: 1px solid var(--win-border-light);
        border-bottom: 1px solid var(--win-border-light);
        padding-top: 1px;
        padding-left: 1px;
    }

    /* ウィンドウの中身 */
    .window-body {
        padding: 10px;
        display: flex;
        flex-direction: row; /* 左右分割に変更 */
        gap: 10px;
        flex: 1;
        overflow: hidden;
    }

    /* 左パネル（入力・制御） */
    .left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 250px;
    }

    /* 右パネル（結果表示） */
    .right-panel {
        flex: 2;
        display: flex;
        flex-direction: column;
        min-width: 300px;
    }

    /* 凹んだ入力エリアや表示エリア */
    textarea, .sunken-panel, input[type="password"] {
        background-color: #ffffff;
        border-top: 1px solid var(--win-border-dark);
        border-left: 1px solid var(--win-border-dark);
        border-right: 1px solid var(--win-border-light);
        border-bottom: 1px solid var(--win-border-light);
        box-shadow: inset 1px 1px 0 var(--win-border-medium), inset -1px -1px 0 #dfdfdf;
        font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
        font-size: 12px;
        padding: 4px;
        box-sizing: border-box;
    }

    textarea {
        width: 100%;
        flex: 1; /* 高さを自動拡張 */
        resize: none; /* 1画面に収めるためリサイズ無効化 */
        outline: none;
    }

    /* APIキー入力欄用のレイアウト */
    .input-group {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 5px;
    }
    .input-group label {
        font-family: "MS UI Gothic", sans-serif;
        white-space: nowrap;
    }
    .input-group input {
        flex: 1;
        font-family: "MS UI Gothic", sans-serif;
    }

    /* 汎用ボタン */
    .btn {
        background-color: var(--win-bg);
        border-top: 1px solid var(--win-border-light);
        border-left: 1px solid var(--win-border-light);
        border-right: 1px solid var(--win-border-dark);
        border-bottom: 1px solid var(--win-border-dark);
        box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 var(--win-border-medium);
        padding: 4px 15px;
        font-family: "MS UI Gothic", "MS PGothic", "ＭＳ Ｐゴシック", sans-serif;
        font-size: 12px;
        cursor: default;
        outline: none;
    }

    .btn:active {
        border-top: 1px solid var(--win-border-dark);
        border-left: 1px solid var(--win-border-dark);
        border-right: 1px solid var(--win-border-light);
        border-bottom: 1px solid var(--win-border-light);
        box-shadow: inset 1px 1px 0 var(--win-border-medium), inset -1px -1px 0 #dfdfdf;
        padding: 5px 14px 3px 16px; /* 押下時の文字ズレを再現 */
    }
    
    .btn:disabled {
        color: var(--win-border-medium);
        text-shadow: 1px 1px 0 #fff;
    }

    /* 結果表示エリア */
    .result-area {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    /* 説明文表示エリア (VS2026手順など) */
    .explanation-area {
        background-color: #ffffe1; /* 古いツールチップ風の色 */
        border: 1px solid #000;
        padding: 8px;
        margin-bottom: 15px;
        font-family: "MS UI Gothic", sans-serif;
        line-height: 1.4;
        white-space: pre-wrap;
    }

    /* 各ファイルのブロック */
    .file-block {
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px dotted var(--win-border-medium);
    }

    .file-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--win-bg);
        padding: 2px;
        margin-bottom: 5px;
        border: 1px solid var(--win-border-medium);
    }

    .file-name {
        font-weight: bold;
        color: var(--win-title-start);
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    /* 簡易ファイルアイコン */
    .file-icon {
        display: inline-block;
        width: 12px;
        height: 16px;
        background-color: #fff;
        border: 1px solid #000;
        position: relative;
    }
    .file-icon::after {
        content: "";
        position: absolute;
        top: 0; right: 0;
        border-width: 0 4px 4px 0;
        border-style: solid;
        border-color: #ccc #fff #fff #ccc;
    }

    pre {
        margin: 0;
        background-color: #ffffff;
        padding: 5px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    /* レトロなスクロールバー */
    ::-webkit-scrollbar {
        width: 16px;
        height: 16px;
    }
    ::-webkit-scrollbar-track {
        background: #dfdfdf;
        border-left: 1px solid #fff;
        border-top: 1px solid #fff;
    }
    ::-webkit-scrollbar-thumb {
        background: var(--win-bg);
        border-top: 1px solid var(--win-border-light);
        border-left: 1px solid var(--win-border-light);
        border-right: 1px solid var(--win-border-dark);
        border-bottom: 1px solid var(--win-border-dark);
    }
    ::-webkit-scrollbar-button:single-button {
        background-color: var(--win-bg);
        border-top: 1px solid var(--win-border-light);
        border-left: 1px solid var(--win-border-light);
        border-right: 1px solid var(--win-border-dark);
        border-bottom: 1px solid var(--win-border-dark);
        display: block;
        height: 16px;
        width: 16px;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-top: 5px;
        border-top: 1px groove var(--win-border-light);
    }

    .btn-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #statusText {
        color: var(--win-border-dark);
    }

    /* レトロなプログレスバー */
    .progress-bar-container {
        width: 100%;
        height: 18px;
        background-color: var(--win-bg);
        border-top: 1px solid var(--win-border-dark);
        border-left: 1px solid var(--win-border-dark);
        border-right: 1px solid var(--win-border-light);
        border-bottom: 1px solid var(--win-border-light);
        box-shadow: inset 1px 1px 0 var(--win-border-medium), inset -1px -1px 0 #dfdfdf;
        display: none; /* 初期は非表示 */
        padding: 2px;
        box-sizing: border-box;
    }

    .progress-bar-fill {
        height: 100%;
        background-color: var(--win-title-start);
        width: 0%;
        transition: width 0.2s linear;
    }

    /* アニメーション用クラス */
    .is-loading .progress-bar-container {
        display: block;
    }
    .is-loading .progress-bar-fill {
        /* AIの思考中を表現するフェイクアニメーション */
        animation: fakeProgress 25s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
    }

    @keyframes fakeProgress {
        0% { width: 0%; }
        20% { width: 30%; }
        50% { width: 60%; }
        80% { width: 85%; }
        100% { width: 95%; } /* API完了時に100%にする */
    }

</style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>AI 自動プログラミングシステム - CodeBuilder</span>
        <div class="title-bar-buttons">
            <button aria-label="Close">X</button>
        </div>
    </div>
    
    <div class="window-body">
        <div class="left-panel">
            <div class="input-group">
                <label for="apiKeyInput">API Key:</label>
                <input type="password" id="apiKeyInput" placeholder="ご自身のGemini APIキーを入力 (GitHub Pages等で使う場合)">
            </div>
            <p>作成したいシステムの詳細な要件を入力してください。</p>
            <textarea id="promptInput" placeholder="例：C#とWPFを使用して、シンプルな電卓アプリを作成してください。ロジックとUIを分離してください。"></textarea>
            
            <div class="controls" id="controlsArea">
                <div class="btn-row">
                    <button class="btn" id="generateBtn" onclick="generateCode()">生成の実行 (G)</button>
                    <span id="statusText">準備完了</span>
                </div>
                <div class="progress-bar-container" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="sunken-panel result-area" id="resultArea">
                <div style="color: #808080; text-align: center; margin-top: 50px;">
                    ここに Visual Studio 2026 の実装手順と、生成されたファイル群が表示されます。
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 実行環境で自動的にAPIキーが埋め込まれます
    const apiKey = ""; 

    // 指数バックオフによるリトライ機能付きFetch
    async function fetchWithRetry(url, options, maxRetries = 5) {
        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTPエラー: ${response.status} ${response.statusText}`);
                }
                return await response.json();
            } catch (e) {
                if (i === maxRetries - 1) throw e;
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
        }
    }

    async function generateCode() {
        const prompt = document.getElementById('promptInput').value.trim();
        if (!prompt) {
            alert("指示を入力してください。"); 
            return;
        }

        // 入力されたAPIキーを取得。空の場合は自動キーをフォールバックとして使用
        let currentApiKey = document.getElementById('apiKeyInput').value.trim();
        if (!currentApiKey) {
            currentApiKey = apiKey; 
        }

        if (!currentApiKey) {
            alert("Gemini APIキーを入力してください。\n(GitHub Pages等で実行する場合はご自身のキーが必要です)");
            return;
        }

        const btn = document.getElementById('generateBtn');
        const status = document.getElementById('statusText');
        const resultArea = document.getElementById('resultArea');
        const controlsArea = document.getElementById('controlsArea');
        const progressFill = document.getElementById('progressFill');

        btn.disabled = true;
        status.textContent = "AI 思考中... (サーバーと通信しています)";
        resultArea.innerHTML = "<div style='padding:10px;'>システムを設計しています。少々お待ちください...</div>";
        
        // プログレスバーのアニメーション開始
        controlsArea.classList.add('is-loading');
        progressFill.style.animation = 'none';
        progressFill.offsetHeight; // リフロー強制
        progressFill.style.animation = null;

        const systemPrompt = `あなたは優秀なシニアソフトウェアエンジニアです。
ユーザーの指示に従い、完全に機能するアプリケーションのコードを作成してください。
大規模な要件や適切な設計が必要な場合は、必ず複数のファイルにコードを分割してください。

【厳格な出力フォーマット】
以下の2つのステップで出力してください。

1. 【Visual Studio 2026 実装手順】
最初に、このコードを Visual Studio 2026 で実行・実装するための具体的な手順（プロジェクトの作成方法、テンプレートの選択、ファイルの追加方法、必要なNuGetパッケージや設定など）をプレーンテキストで分かりやすく解説してください。

2. 【コード本体】
手順の解説の後、各ファイルごとに以下のマークダウン形式を使用して出力してください。
それ以外の結びの言葉などは出力しないでください。

### [ファイルパスまたはファイル名]
\`\`\`[言語名]
[コード本体]
\`\`\`
`;

        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        // 修正点: 安定版の gemini-1.5-flash モデルを使用するようURLを変更
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentApiKey}`;

        try {
            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) {
                // プログレスバーを100%にする
                progressFill.style.animation = 'none';
                progressFill.style.width = '100%';
                
                parseAndDisplayResult(text);
                status.textContent = "完了しました。";
            } else {
                resultArea.innerHTML = "生成結果を取得できませんでした。";
                status.textContent = "エラーが発生しました。";
            }
        } catch (e) {
            resultArea.innerHTML = `<div style="color:red;">通信エラーが発生しました:<br>${e.message}<br><br>APIキーが正しいか、またはネットワーク接続を確認してください。</div>`;
            status.textContent = "エラー";
        } finally {
            btn.disabled = false;
            // 少し待ってからプログレスバーを隠す
            setTimeout(() => {
                controlsArea.classList.remove('is-loading');
                progressFill.style.width = '0%';
            }, 1500);
        }
    }

    // レスポンスから説明文と複数のファイルをパースして表示する
    function parseAndDisplayResult(text) {
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = "";

        // "### " をデリミタとして分割する
        const parts = text.split(/###\s+/);
        
        // 最初の要素はVS2026の実装手順などの説明文
        const explanation = parts[0].trim();
        if (explanation) {
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation-area';
            expDiv.textContent = explanation;
            resultArea.appendChild(expDiv);
        }

        let foundFile = false;

        // 2番目以降の要素は各ファイルのブロック
        for (let i = 1; i < parts.length; i++) {
            const part = parts[i];
            
            // "ファイル名\n```言語\nコード\n```" の形式をパース
            const match = part.match(/^([^\n]+)[\s\S]*?```\w*\n([\s\S]+?)```/);
            
            if (match) {
                foundFile = true;
                const fileName = match[1].trim();
                const code = match[2].trim();

                const block = document.createElement('div');
                block.className = 'file-block';

                const header = document.createElement('div');
                header.className = 'file-header';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'file-name';
                nameDiv.innerHTML = `<span class="file-icon"></span> ${fileName}`;

                // 修正点: コピー、保存ボタンのDOM生成と追加
                const btnGroupDiv = document.createElement('div');
                btnGroupDiv.style.display = 'flex';
                btnGroupDiv.style.gap = '5px';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn';
                copyBtn.textContent = 'コピー';
                copyBtn.onclick = () => copyToClipboard(code, copyBtn);

                const dlBtn = document.createElement('button');
                dlBtn.className = 'btn';
                dlBtn.textContent = '保存';
                dlBtn.onclick = () => downloadFile(fileName, code);

                btnGroupDiv.appendChild(copyBtn);
                btnGroupDiv.appendChild(dlBtn);

                // 修正点: nameDivとボタン群をheaderに追加
                header.appendChild(nameDiv);
                header.appendChild(btnGroupDiv);

                const pre = document.createElement('pre');
                pre.textContent = code;
                
                block.appendChild(header);
                block.appendChild(pre);
                resultArea.appendChild(block);
            }
        }

        // 正規表現にマッチしなかった場合のフォールバック（ファイルが1つも抽出できなかった場合）
        if (!foundFile && parts.length <= 1) {
            const pre = document.createElement('pre');
            pre.textContent = text;
            resultArea.appendChild(pre);
        }
    }

    // クリップボードにコピー
    function copyToClipboard(text, btnElement) {
        // iframe環境などを考慮した堅牢なコピー処理
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
            document.execCommand('copy');
            const originalText = btnElement.textContent;
            btnElement.textContent = 'OK!';
            setTimeout(() => btnElement.textContent = originalText, 1500);
        } catch (err) {
            console.error('コピーに失敗しました', err);
        }
        document.body.removeChild(textArea);
    }

    // ファイルとしてダウンロード
    function downloadFile(filename, content) {
        // パスが含まれている場合、最後のファイル名だけを抽出する簡易処理
        const safeFilename = filename.split('/').pop().split('\\').pop() || "download.txt";
        
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = safeFilename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
